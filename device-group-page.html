<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Device Selection Page</title>
  <style>
    :root {
      --bg: #f4f6fb;
      --card: #ffffff;
      --text: #1f2937;
      --muted: #6b7280;
      --accent: #0f766e;
      --accent-dark: #0b5e58;
      --border: #d1d5db;
      --warning: #9a3412;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: "Segoe UI", Tahoma, sans-serif;
      background: linear-gradient(180deg, #f8fafc 0%, var(--bg) 100%);
      color: var(--text);
    }

    .container {
      max-width: 980px;
      margin: 32px auto;
      padding: 0 16px 24px;
    }

    .page-head {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      margin-bottom: 16px;
    }

    h1 {
      margin: 0;
      font-size: 28px;
    }

    .session-bar {
      display: flex;
      justify-content: flex-end;
      align-items: center;
      gap: 10px;
      margin-bottom: 16px;
    }

    .user-pill {
      display: inline-flex;
      align-items: center;
      border: 1px solid #bae6fd;
      background: #eff6ff;
      color: #1e3a8a;
      border-radius: 999px;
      padding: 6px 12px;
      font-size: 12px;
      font-weight: 600;
      text-transform: uppercase;
    }

    .logout-btn {
      border: 0;
      border-radius: 8px;
      padding: 10px 14px;
      font-size: 14px;
      cursor: pointer;
      background: #e5e7eb;
      color: #111827;
    }

    .logout-btn:hover {
      background: #d1d5db;
    }

    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 12px;
      box-shadow: 0 3px 10px rgba(0, 0, 0, 0.04);
      padding: 18px;
    }

    .subtitle {
      margin: 0 0 16px;
      color: var(--muted);
      font-size: 14px;
      text-transform: uppercase;
      letter-spacing: 0.04em;
    }

    .status {
      min-height: 18px;
      margin-bottom: 16px;
      font-size: 13px;
      text-transform: uppercase;
      color: #065f46;
    }

    .group-buttons {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 14px;
    }

    .group-btn {
      border: 0;
      border-radius: 10px;
      padding: 24px 16px;
      font-weight: 700;
      cursor: pointer;
      color: #ffffff;
      background: var(--accent);
      transition: transform 0.12s ease, background 0.12s ease;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 112px;
    }

    .group-icon {
      width: 46px;
      height: 46px;
      fill: currentColor;
    }

    .group-btn:hover {
      background: var(--accent-dark);
      transform: translateY(-1px);
    }

    .group-btn.alt {
      background: #4b5563;
    }

    .group-btn.alt:hover {
      background: #374151;
    }

    @media (max-width: 700px) {
      .group-buttons {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <main class="container">
    <div class="page-head">
      <h1>Device Selection Page</h1>
    </div>

    <div class="session-bar">
      <span class="user-pill" id="currentUserText"></span>
      <button class="logout-btn" type="button" id="logoutBtn" onclick="if (window.InventoryAuth && typeof window.InventoryAuth.logout === 'function') { window.InventoryAuth.logout(); } else { localStorage.removeItem('inventoryToken'); window.location.href='login-page.html'; }">Logout</button>
    </div>

    <section class="card">
      <p class="subtitle">Select Device Group</p>
      <div id="status" class="status" aria-live="polite"></div>
      <div class="group-buttons">
        <button class="group-btn" id="mobileDevicesBtn" type="button" aria-label="Mobile Devices" title="Mobile Devices">
          <svg class="group-icon" viewBox="0 0 24 24" aria-hidden="true">
            <path d="M7 2a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h10a2 2 0 0 0 2-2V4a2 2 0 0 0-2-2H7zm5 19a1.2 1.2 0 1 1 0-2.4 1.2 1.2 0 0 1 0 2.4zM7 5h10v12H7V5z"/>
          </svg>
        </button>
        <button class="group-btn alt" id="bwcBtn" type="button" aria-label="BWC" title="BWC">
          <svg class="group-icon" viewBox="0 0 24 24" aria-hidden="true">
            <path d="M4 7.5A2.5 2.5 0 0 1 6.5 5h8A2.5 2.5 0 0 1 17 7.5V9l3-1.5v9L17 15v1.5a2.5 2.5 0 0 1-2.5 2.5h-8A2.5 2.5 0 0 1 4 16.5v-9zM11 9a3 3 0 1 0 0 6 3 3 0 0 0 0-6z"/>
          </svg>
        </button>
      </div>
    </section>
  </main>

  <script src="auth.js"></script>
  <script>
    const authContext = window.InventoryAuth.requireAuth("deviceMaster");
    if (!authContext) {
      throw new Error("AUTH_REQUIRED");
    }

    const activeUser = authContext.user;
    const currentUserText = document.getElementById("currentUserText");
    const statusEl = document.getElementById("status");
    const mobileDevicesBtn = document.getElementById("mobileDevicesBtn");
    const bwcBtn = document.getElementById("bwcBtn");

    currentUserText.textContent = `USER: ${activeUser.username} (${activeUser.fullName})`;

    function setStatus(message, isWarning = false) {
      statusEl.textContent = String(message || "").toUpperCase();
      statusEl.style.color = isWarning ? "var(--warning)" : "#065f46";
    }

    mobileDevicesBtn.addEventListener("click", () => {
      setStatus("OPENING MOBILE DEVICES PAGES.");
      window.InventoryAuth.addActionLog("Device Selection Page", "NAVIGATE", `USER ${activeUser.username}: Selected MOBILE DEVICES.`);
      window.location.href = "dashboard-page.html";
    });

    bwcBtn.addEventListener("click", () => {
      setStatus("BWC PAGE IS NOT CONFIGURED YET.", true);
      window.InventoryAuth.addActionLog("Device Selection Page", "SELECT GROUP", `USER ${activeUser.username}: Selected BWC.`);
    });

    window.InventoryAuth.addActionLog("Device Selection Page", "OPEN PAGE", `USER ${activeUser.username}: Opened Device Selection Page.`);
  </script>
</body>
</html>
