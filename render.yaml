services:
  - type: web
    name: inventorynew-app
    env: node
    branch: main
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /api/health
    autoDeploy: true
    envVars:
      - key: NODE_VERSION
        value: 20
      - key: JWT_SECRET
        generateValue: true
      - key: ADMIN_INITIAL_PASSWORD
        value: ADMIN123
      - key: DATABASE_URL
        fromDatabase:
          name: inventorynew-db2
          property: connectionString

databases:
  - name: inventorynew-db2
    databaseName: inventorynew
    user: inventorynew
